            ],

        function renderDaySelector() {
            const container = document.getElementById('daySelector');
            container.innerHTML = days.map((day, index) => `
                <button onclick="selectDay(${index})" 
                        class="day-tab ${index === currentDay ? 'active' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400'} 
                               px-4 py-2 rounded-xl font-medium text-sm whitespace-nowrap shadow-sm">
                    ${day}
                </button>
            `).join('');
        }

        window.selectDay = (index) => {
            currentDay = index;
            renderDaySelector();
            renderSchedule();
        };

        function renderSchedule() {
            const dayName = days[currentDay];
            const today = new Date();
            const selectedDate = new Date(today.setDate(today.getDate() - today.getDay() + currentDay + 1));
            
            document.getElementById('currentDayName').textContent = dayName;
            document.getElementById('currentDate').textContent = selectedDate.toLocaleDateString('id-ID', { 
                day: 'numeric', month: 'long', year: 'numeric' 
            });

            const schedule = scheduleData[dayName] || [];
            const container = document.getElementById('scheduleContainer');
            const emptyState = document.getElementById('emptyState');

            if (schedule.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            // Get current time for highlighting
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const currentTime = currentHour * 60 + currentMinute;

            container.innerHTML = schedule.map((item, index) => {
                const [startTime] = item.waktu.split(' - ');
                const [hours, minutes] = startTime.split(':').map(Number);
                const itemTime = hours * 60 + minutes;
                
                let statusClass = 'bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700';
                let statusIndicator = '';
                
                if (currentDay === (new Date().getDay() === 0 ? 6 : new Date().getDay() - 1)) {
                    if (currentTime >= itemTime && currentTime < itemTime + 90) {
                        statusClass = 'bg-purple-50 dark:bg-purple-900/20 border-purple-200 dark:border-purple-800';
                        statusIndicator = '<span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-purple-500"></span></span>';
                    } else if (currentTime > itemTime + 90) {
                        statusClass = 'bg-green-50 dark:bg-green-900/10 border-green-200 dark:border-green-800 opacity-75';
                        statusIndicator = '<i class="fas fa-check-circle text-green-500"></i>';
                    }
                }

                return `
                    <div class="rounded-2xl p-4 border-2 ${statusClass} transition-all hover:shadow-md">
                        <div class="flex items-start gap-4">
                            <div class="flex-shrink-0">
                                <div class="w-14 h-14 rounded-xl bg-${item.color}-100 dark:bg-${item.color}-900/30 text-${item.color}-600 flex items-center justify-center">
                                    <i class="fas ${item.icon} text-xl"></i>
                                </div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-bold text-gray-900 dark:text-white truncate">${item.mapel}</h3>
                                    ${statusIndicator}
                                </div>
                                <p class="text-sm text-gray-500 mb-2"><i class="fas fa-clock mr-1"></i>${item.waktu}</p>
                                <div class="flex items-center gap-3 text-xs text-gray-500">
                                    <span><i class="fas fa-map-marker-alt mr-1"></i>${item.ruang}</span>
                                    <span><i class="fas fa-user-tie mr-1"></i>${item.guru}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        // Auth check
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            renderDaySelector();
            renderSchedule();
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
