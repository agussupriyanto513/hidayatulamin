<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Santri | Hidayatullah Amin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
                        purple: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed', 800: '#6b21a8', 900: '#581c87' }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'fade-in': 'fadeIn 0.3s ease-out',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
        .glass-dark { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); }
        .gradient-purple { background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%); }
        .gradient-blue { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .gradient-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .gradient-amber { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15); }
        .card-hover:active { transform: scale(0.98); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        .dark .skeleton { background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%); background-size: 200% 100%; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .tab-active { color: #7c3aed; border-bottom: 2px solid #7c3aed; }
        .modal-enter { animation: modalEnter 0.3s ease-out; }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 pb-24">
    
    <!-- Header -->
    <header class="sticky top-0 z-40 glass dark:glass-dark border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl gradient-purple flex items-center justify-center text-white shadow-lg animate-pulse-slow">
                    <i class="fas fa-user-graduate text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 dark:text-white text-sm">Portal Santri</h1>
                    <p class="text-xs text-gray-500" id="greeting">Selamat datang!</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()" class="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-yellow-400 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <i class="fas fa-moon dark:hidden text-sm"></i>
                    <i class="fas fa-sun hidden dark:block text-sm"></i>
                </button>
                <button onclick="showNotifications()" class="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors relative">
                    <i class="fas fa-bell text-sm"></i>
                    <span id="notifBadge" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] text-white flex items-center justify-center hidden">3</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-lg mx-auto px-4 pt-4 space-y-4" id="mainContent">
        
        <!-- Loading State -->
        <div id="loadingState" class="space-y-4">
            <div class="h-32 rounded-3xl skeleton"></div>
            <div class="grid grid-cols-3 gap-3">
                <div class="h-24 rounded-2xl skeleton"></div>
                <div class="h-24 rounded-2xl skeleton"></div>
                <div class="h-24 rounded-2xl skeleton"></div>
            </div>
            <div class="h-48 rounded-3xl skeleton"></div>
        </div>

        <!-- Profile Hero -->
        <div id="profileHero" class="hidden relative overflow-hidden rounded-3xl gradient-purple text-white p-6 shadow-xl animate-slide-up">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
            <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full translate-y-1/2 -translate-x-1/2"></div>
            
            <div class="relative z-10 flex items-center gap-4">
                <div class="relative">
                    <img id="santriPhoto" src="" class="w-20 h-20 rounded-2xl border-4 border-white/30 shadow-lg object-cover">
                    <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-green-400 rounded-full border-2 border-white flex items-center justify-center">
                        <i class="fas fa-check text-[10px] text-white"></i>
                    </div>
                </div>
                <div class="flex-1">
                    <h2 id="santriName" class="text-xl font-bold">Loading...</h2>
                    <p id="santriInfo" class="text-purple-200 text-sm">Loading...</p>
                    <div class="flex items-center gap-2 mt-2 flex-wrap">
                        <span id="santriStatus" class="px-2 py-0.5 bg-white/20 rounded-full text-xs font-medium">Aktif</span>
                        <span id="santriProgram" class="px-2 py-0.5 bg-white/20 rounded-full text-xs font-medium">Tahfidz</span>
                    </div>
                </div>
                <button onclick="showProfileDetail()" class="w-10 h-10 rounded-xl bg-white/20 hover:bg-white/30 flex items-center justify-center transition-colors">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div id="statsCards" class="hidden grid grid-cols-3 gap-3 animate-slide-up" style="animation-delay: 0.1s;">
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 text-center shadow-sm border border-gray-100 dark:border-gray-700 card-hover cursor-pointer" onclick="showDetail('hafalan')">
                <div class="w-10 h-10 mx-auto rounded-xl bg-purple-100 dark:bg-purple-900/30 text-purple-600 flex items-center justify-center mb-2">
                    <i class="fas fa-book-quran"></i>
                </div>
                <p id="statJuz" class="text-xl font-bold text-gray-900 dark:text-white">-</p>
                <p class="text-xs text-gray-500">Juz Hafalan</p>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 text-center shadow-sm border border-gray-100 dark:border-gray-700 card-hover cursor-pointer" onclick="showDetail('kehadiran')">
                <div class="w-10 h-10 mx-auto rounded-xl bg-green-100 dark:bg-green-900/30 text-green-600 flex items-center justify-center mb-2">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <p id="statKehadiran" class="text-xl font-bold text-gray-900 dark:text-white">-%</p>
                <p class="text-xs text-gray-500">Kehadiran</p>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 text-center shadow-sm border border-gray-100 dark:border-gray-700 card-hover cursor-pointer" onclick="showDetail('ranking')">
                <div class="w-10 h-10 mx-auto rounded-xl bg-amber-100 dark:bg-amber-900/30 text-amber-600 flex items-center justify-center mb-2">
                    <i class="fas fa-star"></i>
                </div>
                <p id="statRanking" class="text-xl font-bold text-gray-900 dark:text-white">-</p>
                <p class="text-xs text-gray-500">Ranking</p>
            </div>
        </div>

        <!-- Progress Section -->
        <div id="progressSection" class="hidden bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700 animate-slide-up" style="animation-delay: 0.2s;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-gray-900 dark:text-white">Progres Hafalan</h3>
                <button onclick="showDetail('hafalan')" class="text-purple-600 text-sm font-medium hover:underline">Lihat Detail</button>
            </div>
            <div class="relative">
                <div class="flex mb-2 items-center justify-between">
                    <span id="currentJuz" class="text-xs font-semibold px-2 py-1 rounded-full text-purple-600 bg-purple-100 dark:bg-purple-900/30">
                        Juz -
                    </span>
                    <span id="progressPercent" class="text-xs font-semibold text-purple-600">-%</span>
                </div>
                <div class="overflow-hidden h-3 mb-3 text-xs flex rounded-full bg-purple-100 dark:bg-purple-900/30">
                    <div id="progressBar" style="width:0%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center gradient-purple transition-all duration-1000"></div>
                </div>
                <div class="flex justify-between text-xs text-gray-500">
                    <span>Target: <span id="targetJuz">-</span> Juz</span>
                    <span id="estimasiSelesai">Estimasi: -</span>
                </div>
            </div>
        </div>

        <!-- Menu Grid -->
        <div id="menuGrid" class="hidden grid grid-cols-2 gap-3 animate-slide-up" style="animation-delay: 0.3s;">
            <button onclick="openPage('jadwal')" class="card-hover bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 text-left group">
                <div class="w-12 h-12 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 flex items-center justify-center mb-3 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                    <i class="fas fa-calendar-alt text-xl"></i>
                </div>
                <p class="font-bold text-gray-900 dark:text-white text-sm">Jadwal</p>
                <p class="text-xs text-gray-500 mt-1">Jadwal harian & mingguan</p>
            </button>
            <button onclick="openPage('hafalan')" class="card-hover bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 text-left group">
                <div class="w-12 h-12 rounded-xl bg-green-100 dark:bg-green-900/30 text-green-600 flex items-center justify-center mb-3 group-hover:bg-green-500 group-hover:text-white transition-colors">
                    <i class="fas fa-book-open text-xl"></i>
                </div>
                <p class="font-bold text-gray-900 dark:text-white text-sm">Hafalan</p>
                <p class="text-xs text-gray-500 mt-1">Riwayat setoran & target</p>
            </button>
            <button onclick="openPage('nilai')" class="card-hover bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 text-left group">
                <div class="w-12 h-12 rounded-xl bg-amber-100 dark:bg-amber-900/30 text-amber-600 flex items-center justify-center mb-3 group-hover:bg-amber-500 group-hover:text-white transition-colors">
                    <i class="fas fa-file-alt text-xl"></i>
                </div>
                <p class="font-bold text-gray-900 dark:text-white text-sm">Nilai</p>
                <p class="text-xs text-gray-500 mt-1">Rapor & evaluasi</p>
            </button>
            <button onclick="openPage('kegiatan')" class="card-hover bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 text-left group">
                <div class="w-12 h-12 rounded-xl bg-purple-100 dark:bg-purple-900/30 text-purple-600 flex items-center justify-center mb-3 group-hover:bg-purple-500 group-hover:text-white transition-colors">
                    <i class="fas fa-running text-xl"></i>
                </div>
                <p class="font-bold text-gray-900 dark:text-white text-sm">Kegiatan</p>
                <p class="text-xs text-gray-500 mt-1">Ekstrakurikuler & event</p>
            </button>
        </div>

        <!-- Today's Schedule -->
        <div id="todaySchedule" class="hidden bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700 animate-slide-up" style="animation-delay: 0.4s;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-gray-900 dark:text-white">Jadwal Hari Ini</h3>
                <span id="currentDate" class="text-xs text-gray-500 bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded-lg"></span>
            </div>
            <div id="scheduleList" class="space-y-3">
                <!-- Schedule items will be loaded dynamically -->
            </div>
        </div>

        <!-- Achievements -->
        <div id="achievements" class="hidden bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700 animate-slide-up" style="animation-delay: 0.5s;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-gray-900 dark:text-white">Pencapaian</h3>
                <button onclick="showDetail('achievements')" class="text-purple-600 text-sm font-medium hover:underline">Lihat Semua</button>
            </div>
            <div id="achievementList" class="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
                <!-- Achievements will be loaded dynamically -->
            </div>
        </div>

        <!-- Quick Actions -->
        <div id="quickActions" class="hidden grid grid-cols-4 gap-2 animate-slide-up" style="animation-delay: 0.6s;">
            <button onclick="openPage('pembayaran')" class="flex flex-col items-center gap-2 p-3 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-colors">
                <div class="w-10 h-10 rounded-xl bg-purple-100 dark:bg-purple-900/30 text-purple-600 flex items-center justify-center">
                    <i class="fas fa-wallet"></i>
                </div>
                <span class="text-[10px] font-medium text-gray-700 dark:text-gray-300">SPP</span>
            </button>
            <button onclick="openPage('perizinan')" class="flex flex-col items-center gap-2 p-3 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors">
                <div class="w-10 h-10 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 flex items-center justify-center">
                    <i class="fas fa-file-signature"></i>
                </div>
                <span class="text-[10px] font-medium text-gray-700 dark:text-gray-300">Izin</span>
            </button>
            <button onclick="openPage('konsultasi')" class="flex flex-col items-center gap-2 p-3 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 hover:bg-green-50 dark:hover:bg-green-900/20 transition-colors">
                <div class="w-10 h-10 rounded-xl bg-green-100 dark:bg-green-900/30 text-green-600 flex items-center justify-center">
                    <i class="fas fa-comments"></i>
                </div>
                <span class="text-[10px] font-medium text-gray-700 dark:text-gray-300">Konsul</span>
            </button>
            <button onclick="openPage('pengumuman')" class="flex flex-col items-center gap-2 p-3 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 hover:bg-amber-50 dark:hover:bg-amber-900/20 transition-colors">
                <div class="w-10 h-10 rounded-xl bg-amber-100 dark:bg-amber-900/30 text-amber-600 flex items-center justify-center">
                    <i class="fas fa-bullhorn"></i>
                </div>
                <span class="text-[10px] font-medium text-gray-700 dark:text-gray-300">Info</span>
            </button>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 safe-area-pb z-40">
        <div class="max-w-lg mx-auto px-6 py-2 flex justify-around items-center">
            <button onclick="setActiveTab('home')" id="tab-home" class="nav-tab flex flex-col items-center gap-1 py-2 px-3 text-purple-600 transition-colors">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] font-medium">Beranda</span>
            </button>
            <button onclick="setActiveTab('jadwal')" id="tab-jadwal" class="nav-tab flex flex-col items-center gap-1 py-2 px-3 text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-calendar text-lg"></i>
                <span class="text-[10px] font-medium">Jadwal</span>
            </button>
            <button onclick="setActiveTab('hafalan')" id="tab-hafalan" class="nav-tab flex flex-col items-center gap-1 py-2 px-3 text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-book text-lg"></i>
                <span class="text-[10px] font-medium">Hafalan</span>
            </button>
            <button onclick="setActiveTab('profil')" id="tab-profil" class="nav-tab flex flex-col items-center gap-1 py-2 px-3 text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </button>
        </div>
    </nav>

    <!-- Modal Container -->
    <div id="modalContainer" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 md:top-1/2 md:left-1/2 md:bottom-auto md:right-auto md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-lg">
            <div id="modalContent" class="bg-white dark:bg-gray-800 rounded-t-3xl md:rounded-3xl p-6 max-h-[85vh] overflow-y-auto modal-enter">
                <!-- Modal content will be injected here -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-20 left-4 right-4 transform -translate-y-full transition-transform duration-300 z-50">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-4 flex items-center gap-3 border-l-4 border-purple-500">
            <i class="fas fa-info-circle text-purple-500"></i>
            <p class="text-sm text-gray-700 dark:text-gray-300" id="toastMessage">Notifikasi</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let santriData = null;

        // Auth State Listener
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = user;
            await loadSantriData(user.uid);
        });

        async function loadSantriData(uid) {
            try {
                // Get user data
                const userDoc = await getDoc(doc(db, "users", uid));
                if (!userDoc.exists()) {
                    showToast('Data user tidak ditemukan', 'error');
                    return;
                }

                const userData = userDoc.data();
                if (userData.role !== 'santri') {
                    showToast('Akses ditolak. Halaman ini hanya untuk santri.', 'error');
                    await signOut(auth);
                    return;
                }

                // Get santri profile
                const santriDoc = await getDoc(doc(db, "santri", uid));
                if (santriDoc.exists()) {
                    santriData = santriDoc.data();
                    updateUI(santriData);
                } else {
                    // Create default data if not exists
                    santriData = createDefaultSantriData(userData);
                    updateUI(santriData);
                }

                // Load additional data
                await loadTodaySchedule(uid);
                await loadAchievements(uid);
                await loadNotifications(uid);

                // Hide loading, show content
                document.getElementById('loadingState').classList.add('hidden');
                ['profileHero', 'statsCards', 'progressSection', 'menuGrid', 'todaySchedule', 'achievements', 'quickActions'].forEach(id => {
                    document.getElementById(id).classList.remove('hidden');
                });

            } catch (error) {
                console.error('Error loading data:', error);
                showToast('Gagal memuat data', 'error');
            }
        }

        function createDefaultSantriData(userData) {
            return {
                nama: userData.nama || 'Santri',
                nis: userData.nis || '-',
                kelas: userData.kelas || '-',
                program: userData.program || 'Reguler',
                status: 'Aktif',
                juz: 0,
                targetJuz: 10,
                kehadiran: 100,
                ranking: '-',
                photoURL: `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.nama || 'S')}&background=7c3aed&color=fff&size=128`
            };
        }

        function updateUI(data) {
            // Update greeting
            const hour = new Date().getHours();
            let greeting = 'Selamat datang!';
            if (hour < 11) greeting = 'Selamat pagi!';
            else if (hour < 15) greeting = 'Selamat siang!';
            else if (hour < 18) greeting = 'Selamat sore!';
            else greeting = 'Selamat malam!';
            document.getElementById('greeting').textContent = greeting;

            // Update profile hero
            document.getElementById('santriName').textContent = data.nama;
            document.getElementById('santriInfo').textContent = `Kelas ${data.kelas} • NIS: ${data.nis}`;
            document.getElementById('santriProgram').textContent = data.program;
            document.getElementById('santriStatus').textContent = data.status;
            document.getElementById('santriPhoto').src = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.nama)}&background=7c3aed&color=fff&size=128`;

            // Update stats
            document.getElementById('statJuz').textContent = data.juz || 0;
            document.getElementById('statKehadiran').textContent = (data.kehadiran || 0) + '%';
            document.getElementById('statRanking').textContent = data.ranking || '-';

            // Update progress
            const target = data.targetJuz || 30;
            const current = data.juz || 0;
            const percent = Math.round((current / target) * 100);
            document.getElementById('currentJuz').textContent = `Juz ${Math.floor(current) + 1}`;
            document.getElementById('targetJuz').textContent = target;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
            
            // Calculate estimation
            const remaining = target - current;
            const months = Math.ceil(remaining / 1); // Assume 1 juz per month average
            document.getElementById('estimasiSelesai').textContent = `Estimasi: ${months} bulan lagi`;
        }

        async function loadTodaySchedule(uid) {
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const today = days[new Date().getDay()];
            document.getElementById('currentDate').textContent = today + ', ' + new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long' });

            // Mock schedule data - replace with Firestore query
            const scheduleData = [
                { waktu: '04:30 - 05:30', matapelajaran: 'Sholat Subuh & Dhuha', ruang: 'Masjid', status: 'done', icon: 'fa-pray' },
                { waktu: '07:00 - 08:30', matapelajaran: 'Tahfidz', ruang: 'Ruang Tahfidz 1', status: 'active', icon: 'fa-book-quran' },
                { waktu: '08:45 - 10:15', matapelajaran: 'Bahasa Arab', ruang: 'Kelas 6A', status: 'upcoming', icon: 'fa-language' },
                { waktu: '10:30 - 12:00', matapelajaran: 'Fiqih', ruang: 'Kelas 6A', status: 'upcoming', icon: 'fa-balance-scale' },
                { waktu: '13:00 - 14:30', matapelajaran: 'Hadits', ruang: 'Kelas 6A', status: 'upcoming', icon: 'fa-book' },
            ];

            const scheduleList = document.getElementById('scheduleList');
            scheduleList.innerHTML = scheduleData.map(item => {
                const statusClass = item.status === 'done' ? 'bg-green-50 dark:bg-green-900/20 border-l-4 border-green-500' : 
                                   item.status === 'active' ? 'bg-purple-50 dark:bg-purple-900/20 border-l-4 border-purple-500' :
                                   'bg-gray-50 dark:bg-gray-700/50 border-l-4 border-gray-300 dark:border-gray-600';
                const statusIcon = item.status === 'done' ? '<i class="fas fa-check-circle text-green-500"></i>' :
                                  item.status === 'active' ? '<i class="fas fa-circle text-purple-500 animate-pulse"></i>' :
                                  '<span class="text-xs text-gray-400">' + item.waktu.split(' - ')[0] + '</span>';
                
                return `
                    <div class="flex items-center gap-4 p-3 rounded-xl ${statusClass}">
                        <div class="text-center min-w-[60px]">
                            <p class="text-xs font-medium text-gray-700 dark:text-gray-300">${item.waktu.split(' - ')[0]}</p>
                            <p class="text-[10px] text-gray-400">${item.waktu.split(' - ')[1]}</p>
                        </div>
                        <div class="flex-1">
                            <p class="font-semibold text-gray-900 dark:text-white text-sm">${item.matapelajaran}</p>
                            <p class="text-xs text-gray-500"><i class="fas fa-map-marker-alt mr-1"></i>${item.ruang}</p>
                        </div>
                        ${statusIcon}
                    </div>
                `;
            }).join('');
        }

        async function loadAchievements(uid) {
            // Mock achievements - replace with Firestore query
            const achievements = [
                { icon: 'fa-trophy', color: 'yellow', label: 'Juara 2', desc: 'MTQ Kelas' },
                { icon: 'fa-medal', color: 'green', label: 'Hafiz', desc: '5 Juz' },
                { icon: 'fa-star', color: 'blue', label: 'Santri', desc: 'Teladan' },
                { icon: 'fa-award', color: 'purple', label: 'Rajin', desc: 'Hadir 100%' },
            ];

            const achievementList = document.getElementById('achievementList');
            achievementList.innerHTML = achievements.map(ach => `
                <div class="flex-shrink-0 text-center min-w-[80px]">
                    <div class="w-16 h-16 rounded-2xl bg-${ach.color}-100 dark:bg-${ach.color}-900/30 text-${ach.color}-600 flex items-center justify-center mb-2 mx-auto shadow-sm">
                        <i class="fas ${ach.icon} text-2xl"></i>
                    </div>
                    <p class="text-xs font-semibold text-gray-700 dark:text-gray-300">${ach.label}</p>
                    <p class="text-[10px] text-gray-500">${ach.desc}</p>
                </div>
            `).join('');
        }

        async function loadNotifications(uid) {
            // Check for unread notifications
            const notifBadge = document.getElementById('notifBadge');
            // Mock notification count - replace with Firestore query
            const unreadCount = 3;
            if (unreadCount > 0) {
                notifBadge.textContent = unreadCount;
                notifBadge.classList.remove('hidden');
            }
        }

        // Global functions
        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        window.showToast = (message, type = 'info') => {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle text-red-500';
                toast.querySelector('div').classList.replace('border-purple-500', 'border-red-500');
            } else if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-500';
                toast.querySelector('div').classList.replace('border-purple-500', 'border-green-500');
            } else {
                icon.className = 'fas fa-info-circle text-purple-500';
                toast.querySelector('div').classList.replace('border-red-500', 'border-purple-500');
                toast.querySelector('div').classList.replace('border-green-500', 'border-purple-500');
            }
            
            toast.classList.remove('-translate-y-full');
            setTimeout(() => toast.classList.add('-translate-y-full'), 3000);
        };

        window.openPage = (page) => {
            const pages = {
                'jadwal': 'jadwal-santri.html',
                'hafalan': 'hafalan-santri.html',
                'nilai': 'nilai-santri.html',
                'kegiatan': 'kegiatan-santri.html',
                'pembayaran': 'pembayaran-santri.html',
                'perizinan': 'perizinan-santri.html',
                'konsultasi': 'konsultasi-santri.html',
                'pengumuman': 'pengumuman-santri.html'
            };
            
            if (pages[page]) {
                window.location.href = pages[page];
            } else {
                showToast('Halaman ' + page + ' sedang dikembangkan');
            }
        };

        window.showDetail = (type) => {
            showToast('Detail ' + type + ' akan segera tersedia');
        };

        window.showProfileDetail = () => {
            openPage('profil');
        };

        window.showNotifications = () => {
            showModal('Notifikasi', `
                <div class="space-y-3">
                    <div class="p-3 bg-purple-50 dark:bg-purple-900/20 rounded-xl border-l-4 border-purple-500">
                        <p class="font-semibold text-sm">Jadwal Ujian</p>
                        <p class="text-xs text-gray-600 dark:text-gray-400">Ujian tengah semester dimulai besok</p>
                        <p class="text-[10px] text-gray-400 mt-1">2 jam yang lalu</p>
                    </div>
                    <div class="p-3 bg-green-50 dark:bg-green-900/20 rounded-xl border-l-4 border-green-500">
                        <p class="font-semibold text-sm">Setoran Diterima</p>
                        <p class="text-xs text-gray-600 dark:text-gray-400">Juz 5 halaman 45 telah disetujui</p>
                        <p class="text-[10px] text-gray-400 mt-1">5 jam yang lalu</p>
                    </div>
                    <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl border-l-4 border-blue-500">
                        <p class="font-semibold text-sm">Pembayaran SPP</p>
                        <p class="text-xs text-gray-600 dark:text-gray-400">SPP bulan April telah diterima</p>
                        <p class="text-[10px] text-gray-400 mt-1">1 hari yang lalu</p>
                    </div>
                </div>
            `);
        };

        window.setActiveTab = (tab) => {
            document.querySelectorAll('.nav-tab').forEach(el => {
                el.classList.remove('text-purple-600');
                el.classList.add('text-gray-400');
            });
            document.getElementById('tab-' + tab).classList.remove('text-gray-400');
            document.getElementById('tab-' + tab).classList.add('text-purple-600');
            
            if (tab === 'home') {
                // Already on home
            } else if (tab === 'profil') {
                showModal('Profil Santri', `
                    <div class="text-center mb-6">
                        <img src="${santriData?.photoURL || ''}" class="w-24 h-24 rounded-2xl mx-auto mb-3 border-4 border-purple-100 dark:border-purple-900">
                        <h3 class="font-bold text-lg">${santriData?.nama || 'Santri'}</h3>
                        <p class="text-sm text-gray-500">NIS: ${santriData?.nis || '-'}</p>
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
                            <span class="text-gray-600 dark:text-gray-400">Kelas</span>
                            <span class="font-semibold">${santriData?.kelas || '-'}</span>
                        </div>
                        <div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
                            <span class="text-gray-600 dark:text-gray-400">Program</span>
                            <span class="font-semibold">${santriData?.program || '-'}</span>
                        </div>
                        <div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
                            <span class="text-gray-600 dark:text-gray-400">Status</span>
                            <span class="font-semibold text-green-600">${santriData?.status || 'Aktif'}</span>
                        </div>
                        <button onclick="handleLogout()" class="w-full py-3 rounded-xl bg-red-100 dark:bg-red-900/30 text-red-600 font-semibold hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors mt-4">
                            <i class="fas fa-sign-out-alt mr-2"></i>Logout
                        </button>
                    </div>
                `);
            } else {
                openPage(tab);
            }
        };

        window.showModal = (title, content) => {
            const modal = document.getElementById('modalContainer');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-lg text-gray-900 dark:text-white">${title}</h3>
                    <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-400">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                ${content}
            `;
            modal.classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('modalContainer').classList.add('hidden');
        };

        window.handleLogout = async () => {
            if (confirm('Apakah Anda yakin ingin logout?')) {
                try {
                    await signOut(auth);
                    window.location.href = 'login.html';
                } catch (error) {
                    showToast('Gagal logout: ' + error.message, 'error');
                }
            }
        };

        // Initialize dark mode
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
