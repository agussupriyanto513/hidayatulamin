
index_update_content = '''<!-- ==========================================
SAGATAMA MART - INDEX.HTML UPDATE GUIDE
Tambahkan kode berikut ke index.html Anda
untuk mengintegrasikan sistem autentikasi
========================================== -->

<!-- 1. TAMBAHKAN DI <head>, SETELAH FIREBASE SDK -->
<script src="auth.js"></script>

<!-- 2. TAMBAHKAN DI NAVBAR (ganti link login yang lama) -->
<!-- Contoh implementasi navbar dengan auth state -->
<nav id="mainNav">
    <div class="nav-brand">
        <a href="index.html">🏪 Sagatama Mart</a>
    </div>
    <div class="nav-links">
        <a href="index.html">Beranda</a>
        <a href="products.html">Produk</a>
        <a href="cart.html">🛒 Keranjang</a>
        
        <!-- Auth Links - akan diupdate oleh JavaScript -->
        <div id="authSection">
            <a href="login.html" class="btn-login">Login</a>
            <a href="register.html" class="btn-register">Daftar</a>
        </div>
    </div>
</nav>

<!-- 3. TAMBAHKAN DI BAGIAN BAWAH <body>, SEBELUM </body> -->
<script>
// ==========================================
// AUTH STATE HANDLER UNTUK INDEX/HOME
// ==========================================

document.addEventListener('DOMContentLoaded', () => {
    // Listen untuk auth state changes dari auth.js
    window.addEventListener('sagatamaAuthChange', (e) => {
        updateNavbar(e.detail.user);
    });
    
    // Cek session dari localStorage (untuk load awal)
    checkSession();
});

function updateNavbar(user) {
    const authSection = document.getElementById('authSection');
    
    if (user) {
        // User logged in
        const session = JSON.parse(localStorage.getItem('sagatama_user') || '{}');
        const displayName = session.displayName || session.username || 'User';
        
        authSection.innerHTML = `
            <div class="user-menu">
                <span class="user-greeting">👋 Halo, ${displayName}</span>
                <div class="dropdown">
                    <a href="profile.html">👤 Profil</a>
                    <a href="orders.html">📦 Pesanan</a>
                    <hr>
                    <a href="#" onclick="handleLogout()">🚪 Logout</a>
                </div>
            </div>
        `;
    } else {
        // User not logged in
        authSection.innerHTML = `
            <a href="login.html" class="btn-login">Login</a>
            <a href="register.html" class="btn-register">Daftar</a>
        `;
    }
}

function checkSession() {
    const session = localStorage.getItem('sagatama_user');
    if (session) {
        const userData = JSON.parse(session);
        if (userData.isAuthenticated) {
            // Simulasi user object untuk update navbar
            updateNavbar({ 
                uid: userData.uid,
                displayName: userData.displayName,
                email: userData.email 
            });
        }
    }
}

async function handleLogout() {
    if (window.sagatamaAuth) {
        const result = await window.sagatamaAuth.logout();
        if (result.success) {
            window.location.reload();
        }
    } else {
        // Fallback jika auth.js belum load
        localStorage.removeItem('sagatama_user');
        window.location.href = 'login.html';
    }
}

// ==========================================
// CSS UNTUK NAVBAR (tambahkan ke styles.css)
