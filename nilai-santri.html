<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nilai | Portal Santri</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
                        purple: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed', 800: '#6b21a8', 900: '#581c87' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
        .glass-dark { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); }
        .gradient-purple { background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-btn { transition: all 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%); color: white; }
    </style>
</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 pb-24">
    
    <!-- Header -->
    <header class="sticky top-0 z-40 glass dark:glass-dark border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <button onclick="history.back()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-400">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="font-bold text-lg">Nilai & Rapor</h1>
            <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-yellow-400">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <!-- Semester Selector -->
    <div class="sticky top-[73px] z-30 bg-gray-50 dark:bg-gray-900 py-3 border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-lg mx-auto px-4">
            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1" id="semesterSelector">
                <button onclick="selectSemester('2024-2025-1')" class="tab-btn active px-4 py-2 rounded-xl font-medium text-sm whitespace-nowrap shadow-sm">
                    Ganjil 2024/2025
                </button>
                <button onclick="selectSemester('2024-2025-2')" class="tab-btn bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 px-4 py-2 rounded-xl font-medium text-sm whitespace-nowrap shadow-sm">
                    Genap 2024/2025
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-lg mx-auto px-4 pt-4 space-y-4">
        
        <!-- Summary Card -->
        <div class="bg-gradient-to-br from-purple-500 to-purple-700 rounded-3xl p-6 text-white shadow-xl">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-purple-200 text-sm">Rata-rata Nilai</p>
                    <h2 class="text-4xl font-bold" id="avgNilai">87.5</h2>
                </div>
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-graduation-cap text-3xl"></i>
                </div>
            </div>
            <div class="flex items-center gap-2 mb-4">
                <span class="px-3 py-1 bg-white/20 rounded-full text-sm font-medium">Ranking: 2 dari 25</span>
                <span class="px-3 py-1 bg-green-400/30 rounded-full text-sm font-medium text-green-100">↑ 1</span>
            </div>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-xl font-bold">12</p>
                    <p class="text-xs text-purple-200">Mapel</p>
                </div>
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-xl font-bold text-green-300">8</p>
                    <p class="text-xs text-purple-200">Nilai ≥85</p>
                </div>
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-xl font-bold text-amber-300">2</p>
                    <p class="text-xs text-purple-200">Perlu Perbaikan</p>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
            <h3 class="font-bold text-gray-900 dark:text-white mb-4">Grafik Perkembangan</h3>
            <div class="h-48">
                <canvas id="nilaiChart"></canvas>
            </div>
        </div>

        <!-- Subject List -->
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
            <h3 class="font-bold text-gray-900 dark:text-white mb-4">Detail Nilai</h3>
            <div class="space-y-3" id="nilaiList">
                <!-- Nilai items will be loaded here -->
            </div>
        </div>

        <!-- Download Rapor -->
        <button onclick="downloadRapor()" class="w-full py-4 rounded-2xl bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 font-semibold flex items-center justify-center gap-2 hover:bg-purple-200 dark:hover:bg-purple-900/50 transition-colors">
            <i class="fas fa-download"></i>
            Download Rapor PDF
        </button>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 safe-area-pb">
        <div class="max-w-lg mx-auto px-6 py-2 flex justify-around items-center">
            <a href="dashboard-santri.html" class="flex flex-col items-center gap-1 py-2 px-3 text-gray-400">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] font-medium">Beranda</span>
            </a>
            <a href="jadwal-santri.html" class="flex flex-col items-center gap-1 py-2 px-3 text-gray-400">
                <i class="fas fa-calendar text-lg"></i>
                <span class="text-[10px] font-medium">Jadwal</span>
            </a>
            <a href="hafalan-santri.html" class="flex flex-col items-center gap-1 py-2 px-3 text-gray-400">
                <i class="fas fa-book text-lg"></i>
                <span class="text-[10px] font-medium">Hafalan</span>
            </a>
            <a href="dashboard-santri.html?tab=profil" class="flex flex-col items-center gap-1 py-2 px-3 text-gray-400">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const nilaiData = {
            '2024-2025-1': {
                rata: 87.5,
                ranking: 2,
                totalSantri: 25,
                mapel: [
                    { nama: 'Tahfidz', nilai: 92, kkm: 75, guru: 'Ustadz Hasan' },
                    { nama: 'Bahasa Arab', nilai: 88, kkm: 75, guru: 'Ustadz Mahmud' },
                    { nama: 'Fiqih', nilai: 85, kkm: 75, guru: 'Ustadz Ali' },
                    { nama: 'Aqidah', nilai: 90, kkm: 75, guru: 'Ustadz Mahmud' },
                    { nama: 'Hadits', nilai: 87, kkm: 75, guru: 'Ustadz Zainal' },
                    { nama: 'Tafsir', nilai: 84, kkm: 75, guru: 'Ustadz Mahmud' },
                    { nama: 'Nahwu', nilai: 78, kkm: 75, guru: 'Ustadz Ali' },
                    { nama: 'Shorof', nilai: 82, kkm: 75, guru: 'Ustadz Zainal' },
                    { nama: 'Bahasa Indonesia', nilai: 89, kkm: 75, guru: 'Ustadz Mahmud' },
                    { nama: 'Matematika', nilai: 76, kkm: 75, guru: 'Ustadzah Aminah' },
                    { nama: 'IPA', nilai: 88, kkm: 75, guru: 'Ustadzah Fatimah' },
                    { nama: 'IPS', nilai: 91, kkm: 75, guru: 'Ustadz Zainal' },
                ],
                history: [75, 78, 80, 82, 85, 87, 88, 87.5]
            },
            '2024-2025-2': {
                rata: 89.2,
                ranking: 1,
                totalSantri: 25,
                mapel: [
                    { nama: 'Tahfidz', nilai: 94, kkm: 75, guru: 'Ustadz Hasan' },
                    { nama: 'Bahasa Arab', nilai: 90, kkm: 75, guru: 'Ustadz Mahmud' },
                    { nama: 'Fiqih', nilai: 88, kkm: 75, guru: 'Ustadz Ali' },
                    { nama: 'Aqidah', nilai: 92, kkm: 75, guru: 'Ustadz Mahmud' },
                ],
                history: [87.5, 88, 88.5, 89, 89.2]
            }
        };

        let currentSemester = '2024-2025-1';
        let nilaiChart = null;

        function initChart(data) {
            const ctx = document.getElementById('nilaiChart').getContext('2d');
            
            if (nilaiChart) nilaiChart.destroy();
            
            nilaiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['PTS 1', 'PTS 2', 'PTS 3', 'PAS 1', 'PAS 2', 'US 1', 'US 2', 'Akhir'],
                    datasets: [{
                        label: 'Rata-rata Nilai',
                        data: data.history,
                        borderColor: '#9333ea',
                        backgroundColor: 'rgba(147, 51, 234, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#9333ea'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 70, max: 100, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderNilaiList(semester) {
            const data = nilaiData[semester];
            const container = document.getElementById('nilaiList');
            
            container.innerHTML = data.mapel.map(mapel => {
                const diff = mapel.nilai - mapel.kkm;
                const statusColor = diff >= 10 ? 'text-green-600 bg-green-100 dark:bg-green-900/30' :
                                   diff >= 0 ? 'text-blue-600 bg-blue-100 dark:bg-blue-900/30' :
                                   'text-red-600 bg-red-100 dark:bg-red-900/30';
                const statusText = diff >= 10 ? 'Sangat Baik' : diff >= 0 ? 'Tuntas' : 'Remedial';
                
                return `
                    <div class="flex items-center gap-4 p-4 rounded-xl bg-gray-50 dark:bg-gray-700/50 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <div class="w-12 h-12 rounded-xl bg-purple-100 dark:bg-purple-900/30 text-purple-600 flex items-center justify-center font-bold text-lg">
                            ${mapel.nilai}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-1">
                                <h4 class="font-semibold text-gray-900 dark:text-white">${mapel.nama}</h4>
                                <span class="px-2 py-0.5 rounded-lg text-xs font-medium ${statusColor}">${statusText}</span>
                            </div>
                            <p class="text-xs text-gray-500">${mapel.guru} • KKM: ${mapel.kkm}</p>
                            <div class="mt-2 h-1.5 bg-gray-200 dark:bg-gray-600 rounded-full overflow-hidden">
                                <div class="h-full ${diff >= 0 ? 'bg-purple-500' : 'bg-red-500'} rounded-full" style="width: ${mapel.nilai}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.selectSemester = (semester) => {
            currentSemester = semester;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('bg-white', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400');
            });
            event.target.classList.add('active');
            event.target.classList.remove('bg-white', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400');
            
            const data = nilaiData[semester];
            document.getElementById('avgNilai').textContent = data.rata;
            initChart(data);
            renderNilaiList(semester);
        };

        window.downloadRapor = () => {
            alert('Rapor akan diunduh dalam format PDF');
        };

        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            const data = nilaiData[currentSemester];
            initChart(data);
            renderNilaiList(currentSemester);
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
