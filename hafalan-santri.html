<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafalan | Portal Santri</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
                        purple: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed', 800: '#6b21a8', 900: '#581c87' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
        .glass-dark { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); }
        .gradient-purple { background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 pb-24">
    
    <!-- Header -->
    <header class="sticky top-0 z-40 glass dark:glass-dark border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <button onclick="history.back()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-400">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="font-bold text-lg">Hafalan & Setoran</h1>
            <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-yellow-400">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-lg mx-auto px-4 pt-4 space-y-4">
        
        <!-- Progress Overview -->
        <div class="bg-gradient-to-br from-purple-500 to-purple-700 rounded-3xl p-6 text-white shadow-xl">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-purple-200 text-sm">Total Hafalan</p>
                    <h2 class="text-3xl font-bold" id="totalJuz">5.5 Juz</h2>
                </div>
                <div class="w-20 h-20 relative">
                    <canvas id="progressChart"></canvas>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-xl font-bold" id="progressPercent">18%</span>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-2xl font-bold" id="totalHalaman">110</p>
                    <p class="text-xs text-purple-200">Halaman</p>
                </div>
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-2xl font-bold" id="totalSetoran">45</p>
                    <p class="text-xs text-purple-200">Setoran</p>
                </div>
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-2xl font-bold" id="rataRating">4.8</p>
                    <p class="text-xs text-purple-200">Rating</p>
                </div>
            </div>
        </div>

        <!-- Juz Progress -->
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
            <h3 class="font-bold text-gray-900 dark:text-white mb-4">Progres per Juz</h3>
            <div class="space-y-3" id="juzList">
                <!-- Juz items will be loaded here -->
            </div>
        </div>

        <!-- Recent Setoran -->
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-gray-900 dark:text-white">Riwayat Setoran</h3>
                <button onclick="showAllSetoran()" class="text-purple-600 text-sm font-medium">Lihat Semua</button>
            </div>
            <div class="space-y-3" id="setoranList">
                <!-- Setoran items will be loaded here -->
            </div>
        </div>

        <!-- Target Section -->
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
            <h3 class="font-bold text-gray-900 dark:text-white mb-4">Target Hafalan</h3>
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-600 dark:text-gray-400">Tahun Ini</span>
                        <span class="font-semibold">10 Juz</span>
                    </div>
                    <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div class="h-full gradient-purple rounded-full" style="width: 55%"></div>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">5.5 dari 10 Juz tercapai</p>
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-600 dark:text-gray-400">Target Khatam</span>
                        <span class="font-semibold">30 Juz</span>
                    </div>
                    <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-blue-500 to-blue-600 rounded-full" style="width: 18%"></div>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">5.5 dari 30 Juz (Estimasi 3 tahun lagi)</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 safe-area-pb">
        <div class="max-w-lg mx-auto px-6 py-2 flex justify-around items-center">
            <a href="dashboard-santri.html" class="flex flex-col items-center gap-1 py-2 px-3 text-gray-400">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] font-medium">Beranda</span>
            </a>
            <a href="jadwal-santri.html" class="flex flex-col items-center gap-1 py-2 px-3 text-gray-400">
                <i class="fas fa-calendar text-lg"></i>
                <span class="text-[10px] font-medium">Jadwal</span>
            </a>
            <button class="flex flex-col items-center gap-1 py-2 px-3 text-purple-600">
                <i class="fas fa-book text-lg"></i>
                <span class="text-[10px] font-medium">Hafalan</span>
            </button>
            <a href="dashboard-santri.html?tab=profil" class="flex flex-col items-center gap-1 py-2 px-3 text-gray-400">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Sample data - replace with Firestore
        const hafalanData = {
            totalJuz: 5.5,
            targetJuz: 30,
            totalHalaman: 110,
            totalSetoran: 45,
            rataRating: 4.8,
            juzProgress: [
                { juz: 1, status: 'completed', halaman: 20, rating: 5 },
                { juz: 2, status: 'completed', halaman: 22, rating: 4.5 },
                { juz: 3, status: 'completed', halaman: 20, rating: 5 },
                { juz: 4, status: 'completed', halaman: 24, rating: 4.8 },
                { juz: 5, status: 'completed', halaman: 22, rating: 5 },
                { juz: 6, status: 'in_progress', halaman: 2, rating: null },
            ],
            riwayatSetoran: [
                { tanggal: '2025-04-14', juz: 6, halaman: '107-108', surat: 'Al-An\'am', status: 'approved', rating: 5, penguji: 'Ustadz Hasan' },
                { tanggal: '2025-04-13', juz: 5, halaman: '106-107', surat: 'Al-Ma\'idah', status: 'approved', rating: 5, penguji: 'Ustadz Hasan' },
                { tanggal: '2025-04-12', juz: 5, halaman: '104-105', surat: 'Al-Ma\'idah', status: 'approved', rating: 4.5, penguji: 'Ustadz Ahmad' },
                { tanggal: '2025-04-11', juz: 5, halaman: '102-103', surat: 'An-Nisa', status: 'approved', rating: 5, penguji: 'Ustadz Hasan' },
                { tanggal: '2025-04-10', juz: 5, halaman: '100-101', surat: 'An-Nisa', status: 'revision', rating: null, penguji: 'Ustadz Hasan', catatan: 'Perlu perbaikan tajwid' },
            ]
        };

        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const percent = Math.round((hafalanData.totalJuz / hafalanData.targetJuz) * 100);
            
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Hafalan', 'Sisa'],
                    datasets: [{
                        data: [hafalanData.totalJuz, hafalanData.targetJuz - hafalanData.totalJuz],
                        backgroundColor: ['#ffffff', 'rgba(255,255,255,0.3)'],
                        borderWidth: 0,
                        cutout: '75%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function renderJuzList() {
            const container = document.getElementById('juzList');
            container.innerHTML = hafalanData.juzProgress.map(juz => {
                const percent = juz.status === 'completed' ? 100 : Math.round((juz.halaman / 20) * 100);
                const statusColor = juz.status === 'completed' ? 'bg-green-500' : 'bg-purple-500';
                const statusText = juz.status === 'completed' ? 'Selesai' : 'Dalam Progres';
                const stars = juz.rating ? '★'.repeat(Math.floor(juz.rating)) + '☆'.repeat(5 - Math.floor(juz.rating)) : '-';
                
                return `
                    <div class="flex items-center gap-4 p-3 rounded-xl bg-gray-50 dark:bg-gray-700/50">
                        <div class="w-12 h-12 rounded-xl ${juz.status === 'completed' ? 'bg-green-100 dark:bg-green-900/30 text-green-600' : 'bg-purple-100 dark:bg-purple-900/30 text-purple-600'} flex items-center justify-center font-bold">
                            ${juz.juz}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-semibold text-sm">Juz ${juz.juz}</span>
                                <span class="text-xs ${juz.status === 'completed' ? 'text-green-600' : 'text-purple-600'}">${statusText}</span>
                            </div>
                            <div class="h-2 bg-gray-200 dark:bg-gray-600 rounded-full overflow-hidden mb-1">
                                <div class="h-full ${statusColor} rounded-full transition-all" style="width: ${percent}%"></div>
                            </div>
                            <div class="flex justify-between text-xs text-gray-500">
                                <span>${juz.halaman} halaman</span>
                                <span class="text-yellow-500">${stars}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSetoran() {
            const container = document.getElementById('setoranList');
            container.innerHTML = hafalanData.riwayatSetoran.slice(0, 5).map(setoran => {
                const statusIcon = setoran.status === 'approved' ? '<i class="fas fa-check-circle text-green-500"></i>' : 
                                  setoran.status === 'revision' ? '<i class="fas fa-exclamation-circle text-amber-500"></i>' :
                                  '<i class="fas fa-clock text-blue-500"></i>';
                const statusClass = setoran.status === 'approved' ? 'border-l-4 border-green-500' : 
                                   setoran.status === 'revision' ? 'border-l-4 border-amber-500' :
                                   'border-l-4 border-blue-500';
                
                return `
                    <div class="p-3 rounded-xl bg-gray-50 dark:bg-gray-700/50 ${statusClass}">
                        <div class="flex items-start justify-between">
                            <div>
                                <p class="font-semibold text-sm">Juz ${setoran.juz} - ${setoran.surat}</p>
                                <p class="text-xs text-gray-500">Halaman ${setoran.halaman} • ${new Date(setoran.tanggal).toLocaleDateString('id-ID')}</p>
                                <p class="text-xs text-gray-500"><i class="fas fa-user-check mr-1"></i>${setoran.penguji}</p>
                                ${setoran.catatan ? `<p class="text-xs text-amber-600 mt-1"><i class="fas fa-info-circle mr-1"></i>${setoran.catatan}</p>` : ''}
                            </div>
                            <div class="text-right">
                                ${statusIcon}
                                ${setoran.rating ? `<p class="text-xs text-yellow-500 mt-1">${'★'.repeat(setoran.rating)}</p>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.showAllSetoran = () => {
            alert('Fitur lengkap akan menampilkan semua riwayat setoran dengan filter dan pencarian');
        };

        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        // Auth check
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            initChart();
            renderJuzList();
            renderSetoran();
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
