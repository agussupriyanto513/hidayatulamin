<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Setup Admin Pertama - Hidayatul Amin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #10b981; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #059669; }
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 5px; display: none; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <h1>Setup Admin Pertama</h1>
    <p>Gunakan halaman ini untuk membuat admin pertama yang akan mengelola verifikasi user lain.</p>
    
    <div class="alert alert-success" id="success"></div>
    <div class="alert alert-error" id="error"></div>

    <form id="setupForm">
        <div class="form-group">
            <label>Email Admin</label>
            <input type="email" id="email" required placeholder="admin@email.com">
        </div>
        <div class="form-group">
            <label>Password (min 6 karakter)</label>
            <input type="password" id="password" required minlength="6" placeholder="••••••">
        </div>
        <div class="form-group">
            <label>Nama Admin</label>
            <input type="text" id="nama" required placeholder="Nama Lengkap">
        </div>
        <div class="form-group">
            <label>Nomor HP</label>
            <input type="tel" id="noHp" placeholder="08xxxxxxxxxx">
        </div>
        <button type="submit">Buat Admin Super</button>
    </form>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('setupForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nama = document.getElementById('nama').value;
            const noHp = document.getElementById('noHp').value;
            
            try {
                // Create user
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCred.user;
                
                // Create admin document
                await db.collection('admins').doc(user.uid).set({
                    uid: user.uid,
                    nama: nama,
                    email: email,
                    noHp: noHp,
                    role: 'admin',
                    level: 'super',
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                document.getElementById('success').style.display = 'block';
                document.getElementById('success').textContent = 'Admin super berhasil dibuat! Silakan login di login.html';
                
                // Logout immediately
                await auth.signOut();
                
            } catch (error) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error: ' + error.message;
            }
        };
    </script>
</body>
</html>
