<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hidayatul Amin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 2rem;
        }

        h1 {
            color: #0f172a;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p {
            color: #64748b;
            font-size: 0.9rem;
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-btn {
            padding: 15px 10px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .role-btn:hover, .role-btn.active {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .role-btn i {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #64748b;
        }

        .role-btn.active i, .role-btn:hover i {
            color: #10b981;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #10b981;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16,185,129,0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e2e8f0;
        }

        .links a {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #10b981;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Kembali ke Beranda
        </a>

        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-mosque"></i>
            </div>
            <h1>Masuk ke Portal</h1>
            <p>Yayasan Pendidikan Hidayatul Amin</p>
        </div>

        <div class="role-selector">
            <button class="role-btn active" data-role="wali" onclick="selectRole('wali')">
                <i class="fas fa-users"></i>
                <small>Wali</small>
            </button>
            <button class="role-btn" data-role="ustadz" onclick="selectRole('ustadz')">
                <i class="fas fa-chalkboard-teacher"></i>
                <small>Ustadz</small>
            </button>
            <button class="role-btn" data-role="admin" onclick="selectRole('admin')">
                <i class="fas fa-user-shield"></i>
                <small>Admin</small>
            </button>
        </div>

        <div class="error-msg" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Email atau password salah</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="nama@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i>
                Masuk
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Memverifikasi...</p>
        </div>

        <div class="links">
            <p>Belum punya akun? <a href="#" onclick="showRegister()">Daftar</a></p>
        </div>
    </div>

    <script>
        // ==========================================
        // FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==========================================
        // GLOBAL VARIABLES
        // ==========================================
        let selectedRole = 'wali';

        // ==========================================
        // ROLE SELECTION
        // ==========================================
        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.role === role) {
                    btn.classList.add('active');
                }
            });
        }

        // Check URL params for role
        const urlParams = new URLSearchParams(window.location.search);
        const roleParam = urlParams.get('role');
        if (roleParam && ['wali', 'ustadz', 'admin'].includes(roleParam)) {
            selectRole(roleParam);
        }

        // ==========================================
        // AUTHENTICATION
        // ==========================================
        
        // Check if already logged in - PENTING UNTUK PERSISTENCE
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // User sudah login, redirect ke dashboard sesuai role
                console.log('User already logged in:', user.email);
                await redirectBasedOnRole(user.uid);
            }
        });

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const loading = document.getElementById('loading');
            const form = document.getElementById('loginForm');
            const errorMsg = document.getElementById('errorMsg');

            // Hide error
            errorMsg.style.display = 'none';
            
            // Show loading
            btn.disabled = true;
            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Verify role
                const hasAccess = await verifyRole(user.uid, selectedRole);
                
                if (!hasAccess) {
                    throw new Error(`Akun ini tidak terdaftar sebagai ${selectedRole}`);
                }

                // Redirect ke dashboard
                redirectToDashboard(selectedRole);

            } catch (error) {
                console.error('Login error:', error);
                
                // Show error
                let errorMessage = 'Email atau password salah';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Akun tidak ditemukan';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Password salah';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Format email tidak valid';
                } else if (error.message) {
                    errorMessage = error.message;
                }
                
                document.getElementById('errorText').textContent = errorMessage;
                errorMsg.style.display = 'flex';
                
                // Reset UI
                btn.disabled = false;
                form.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        async function verifyRole(uid, role) {
            try {
                const doc = await db.collection(role === 'wali' ? 'wali_santri' : role === 'ustadz' ? 'ustadz' : 'admins').doc(uid).get();
                return doc.exists;
            } catch (error) {
                console.error('Role verification error:', error);
                return false;
            }
        }

        async function redirectBasedOnRole(uid) {
            // Check admin first
            const adminDoc = await db.collection('admins').doc(uid).get();
            if (adminDoc.exists) {
                redirectToDashboard('admin');
                return;
            }

            // Check ustadz
            const ustadzDoc = await db.collection('ustadz').doc(uid).get();
            if (ustadzDoc.exists) {
                redirectToDashboard('ustadz');
                return;
            }

            // Check wali
            const waliDoc = await db.collection('wali_santri').doc(uid).get();
            if (waliDoc.exists) {
                redirectToDashboard('wali');
                return;
            }

            // If no role found, logout
            await auth.signOut();
            alert('Akun tidak memiliki role yang valid');
        }

        function redirectToDashboard(role) {
            const dashboards = {
                'wali': 'dashboard-wali.html',
                'ustadz': 'dashboard-ustadz.html',
                'admin': 'dashboard-admin.html'
            };
            
            window.location.href = dashboards[role];
        }

        function showRegister() {
            alert('Silakan hubungi admin untuk pendaftaran akun baru');
        }
    </script>

</body>
</html>
