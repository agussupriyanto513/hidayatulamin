<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Portal Santri Hidayatullah Amin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
                        purple: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed', 800: '#6b21a8', 900: '#581c87' }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-purple { background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); }
        .glass-dark { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); }
        .input-group:focus-within label { color: #7c3aed; transform: translateY(-24px) scale(0.85); }
        .input-group label { transition: all 0.3s ease; }
        .floating-shape { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.6; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #7c3aed; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .shake-animation { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen gradient-bg flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Animated Background Shapes -->
    <div class="floating-shape w-72 h-72 bg-purple-400 top-10 left-10 animate-float" style="animation-delay: 0s;"></div>
    <div class="floating-shape w-96 h-96 bg-blue-400 bottom-20 right-10 animate-float" style="animation-delay: 2s;"></div>
    <div class="floating-shape w-64 h-64 bg-pink-400 top-1/2 left-1/3 animate-float" style="animation-delay: 4s;"></div>
    
    <!-- Login Container -->
    <div class="w-full max-w-md animate-slide-up relative z-10">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto rounded-2xl bg-white/20 backdrop-blur-lg flex items-center justify-center mb-4 shadow-2xl">
                <i class="fas fa-mosque text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-1">Portal Santri</h1>
            <p class="text-white/80 text-sm">Yayasan Hidayatullah Amin</p>
        </div>
        
        <!-- Login Card -->
        <div class="glass dark:glass-dark rounded-3xl shadow-2xl p-8 border border-white/20">
            <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6 text-center">Masuk ke Akun</h2>
            
            <!-- Error Message -->
            <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 dark:bg-red-900/30 border border-red-400 dark:border-red-700 rounded-xl text-red-700 dark:text-red-300 text-sm flex items-center gap-2">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Email atau password salah</span>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <!-- Email Input -->
                <div class="input-group relative">
                    <input type="email" id="email" required 
                           class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-transparent dark:bg-gray-800/50 text-gray-800 dark:text-white focus:border-purple-500 focus:outline-none transition-colors peer"
                           placeholder=" ">
                    <label for="email" 
                           class="absolute left-4 top-3 text-gray-500 dark:text-gray-400 pointer-events-none origin-left">
                        <i class="fas fa-envelope mr-2"></i>Email
                    </label>
                </div>
                
                <!-- Password Input -->
                <div class="input-group relative">
                    <input type="password" id="password" required 
                           class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-transparent dark:bg-gray-800/50 text-gray-800 dark:text-white focus:border-purple-500 focus:outline-none transition-colors peer pr-12"
                           placeholder=" ">
                    <label for="password" 
                           class="absolute left-4 top-3 text-gray-500 dark:text-gray-400 pointer-events-none origin-left">
                        <i class="fas fa-lock mr-2"></i>Password
                    </label>
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
                
                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-gray-300 text-purple-600 focus:ring-purple-500">
                        <span class="text-gray-600 dark:text-gray-400">Ingat saya</span>
                    </label>
                    <a href="#" onclick="showForgotPassword()" class="text-purple-600 hover:text-purple-700 font-medium">Lupa password?</a>
                </div>
                
                <!-- Login Button -->
                <button type="submit" id="loginBtn"
                        class="w-full py-3.5 rounded-xl gradient-purple text-white font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2">
                    <span id="btnText">Masuk</span>
                    <div id="btnLoading" class="loading-spinner hidden"></div>
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">atau masuk sebagai</span>
                </div>
            </div>
            
            <!-- Quick Login Buttons -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="quickLogin('santri')" class="py-2.5 rounded-xl border-2 border-purple-200 dark:border-purple-800 text-purple-700 dark:text-purple-300 font-medium hover:bg-purple-50 dark:hover:bg-purple-900/30 transition-colors text-sm">
                    <i class="fas fa-user-graduate mr-2"></i>Santri
                </button>
                <button onclick="quickLogin('wali')" class="py-2.5 rounded-xl border-2 border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-300 font-medium hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors text-sm">
                    <i class="fas fa-users mr-2"></i>Wali
                </button>
            </div>
        </div>
        
        <!-- Footer -->
        <p class="text-center text-white/70 text-xs mt-6">
            © 2025 Yayasan Hidayatullah Amin<br>
            Sistem Informasi Pondok Pesantren
        </p>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-20 transition-all duration-300 z-50">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl px-6 py-4 flex items-center gap-3 border-l-4 border-purple-500 min-w-max">
            <i class="fas fa-info-circle text-purple-500 text-xl"></i>
            <p class="text-sm text-gray-700 dark:text-gray-300 font-medium" id="toastMessage">Notifikasi</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                redirectBasedOnRole(user.uid);
            }
        });

        async function redirectBasedOnRole(uid) {
            const userDoc = await getDoc(doc(db, "users", uid));
            if (userDoc.exists()) {
                const role = userDoc.data().role;
                if (role === 'santri') window.location.href = 'dashboard-santri.html';
                else if (role === 'wali') window.location.href = 'dashboard-wali.html';
                else if (role === 'pengajar') window.location.href = 'dashboard-pengajar.html';
                else if (role === 'admin') window.location.href = 'dashboard-admin.html';
            }
        }

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const errorDiv = document.getElementById('errorMessage');
            
            // Show loading
            loginBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            
            try {
                // Set persistence
                const persistence = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistence);
                
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                showToast('Login berhasil! Mengalihkan...', 'success');
                
                setTimeout(() => {
                    redirectBasedOnRole(userCredential.user.uid);
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                let errorMsg = 'Terjadi kesalahan. Silakan coba lagi.';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorMsg = 'Email tidak terdaftar'; break;
                    case 'auth/wrong-password':
                        errorMsg = 'Password salah'; break;
                    case 'auth/invalid-email':
                        errorMsg = 'Format email tidak valid'; break;
                    case 'auth/too-many-requests':
                        errorMsg = 'Terlalu banyak percobaan. Coba lagi nanti.'; break;
                }
                
                document.getElementById('errorText').textContent = errorMsg;
                errorDiv.classList.remove('hidden');
                loginBtn.classList.add('shake-animation');
                setTimeout(() => loginBtn.classList.remove('shake-animation'), 500);
            } finally {
                loginBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        // Toggle Password Visibility
        window.togglePassword = () => {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        };

        // Quick Login Demo
        window.quickLogin = (type) => {
            const demoAccounts = {
                'santri': { email: 'santri@demo.com', password: 'santri123' },
                'wali': { email: 'wali@demo.com', password: 'wali123' }
            };
            
            if (demoAccounts[type]) {
                document.getElementById('email').value = demoAccounts[type].email;
                document.getElementById('password').value = demoAccounts[type].password;
                showToast(`Demo akun ${type} diisi otomatis`, 'info');
            }
        };

        // Show Toast
        window.showToast = (message, type = 'info') => {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            toastMessage.textContent = message;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-500 text-xl';
                toast.querySelector('div').classList.replace('border-purple-500', 'border-green-500');
            } else {
                icon.className = 'fas fa-info-circle text-purple-500 text-xl';
                toast.querySelector('div').classList.replace('border-green-500', 'border-purple-500');
            }
            
            toast.classList.remove('-translate-y-20');
            toast.classList.add('translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0');
                toast.classList.add('-translate-y-20');
            }, 3000);
        };

        window.showForgotPassword = () => {
            showToast('Hubungi admin untuk reset password', 'info');
        };

        // Dark mode check
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
