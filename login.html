<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hidayatul Amin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
            
            <form onsubmit="handleLogin(event)">
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" autocomplete="username" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" autocomplete="current-password" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <button type="submit" id="loginBtn" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl flex justify-center items-center transition-all">
                    
                    <span class="btn-loader hidden mr-3">
                        <i class="fas fa-spinner animate-spin"></i>
                    </span>
                    
                    <span class="btn-text">Masuk Sekarang</span>
                </button>
            </form>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-3e614.firebaseapp.com",
            projectId: "hidayatulamin-3e614",
            storageBucket: "hidayatulamin-3e614.appspot.com",
            messagingSenderId: "931234567890",
            appId: "1:931234567890:web:abcdef123456"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Pastikan selectedRole terdefinisi (bisa dari klik kartu UI)
        window.selectedRole = "admin"; // Contoh default, sesuaikan dengan logika klik kartu Anda

        window.handleLogin = async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const btnLoader = btn.querySelector('.btn-loader');
            const btnText = btn.querySelector('.btn-text');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!window.selectedRole) {
                alert('Pilih peran terlebih dahulu!');
                return;
            }

            try {
                // Mulai Loading
                btn.disabled = true;
                if (btnLoader) btnLoader.classList.remove('hidden');
                if (btnText) btnText.textContent = 'Memuat...';

                // 1. Auth Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Cek Role di Firestore
                const uDoc = await getDoc(doc(db, "users", user.uid));
                
                if (uDoc.exists()) {
                    const userData = uDoc.data();
                    if (userData.role === window.selectedRole) {
                        alert('Login Berhasil!');
                        window.location.href = `dashboard-${userData.role}.html`;
                    } else {
                        await signOut(auth);
                        alert(`Akses ditolak. Peran Anda adalah ${userData.role}`);
                    }
                } else {
                    await signOut(auth);
                    alert('Data pengguna tidak ditemukan di database.');
                }

            } catch (error) {
                console.error(error);
                let msg = "Gagal login: " + error.message;
                if (error.code === 'auth/invalid-credential') msg = "Email atau Password salah!";
                alert(msg);
            } finally {
                // Berhenti Loading (Apapun hasilnya)
                btn.disabled = false;
                if (btnLoader) btnLoader.classList.add('hidden');
                if (btnText) btnText.textContent = 'Masuk Sekarang';
            }
        };
    </script>
</body>
</html>
