<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hidayatulamin</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Pi Network SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .login-body {
            padding: 40px 30px;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .login-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .login-tab.active {
            color: #1e3c72;
            border-bottom-color: #1e3c72;
        }

        .login-tab:hover {
            color: #1e3c72;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
        }

        .btn-pi {
            background: linear-gradient(135deg, #F7A600 0%, #E08E00 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-pi:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(247, 166, 0, 0.4);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #666;
            position: relative;
            font-size: 0.9rem;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e3c72;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .pi-info {
            background: #fff8e1;
            border-left: 4px solid #F7A600;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            color: #666;
        }

        .pi-info strong {
            color: #F7A600;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: #1e3c72;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-home a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-header {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
            
            .login-body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Login</h1>
            <p>Selamat datang di Hidayatulamin</p>
        </div>
        
        <div class="login-body">
            <!-- Error & Success Messages -->
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- Loading -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Memproses...</p>
            </div>

            <!-- Tabs -->
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('email')">Email</div>
                <div class="login-tab" onclick="switchTab('pi')">Pi Network</div>
            </div>

            <!-- Email Login Tab -->
            <div id="emailTab" class="tab-content active">
                <form id="emailLoginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="nama@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Masukkan password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Masuk</button>
                </form>

                <div class="divider">
                    <span>atau</span>
                </div>

                <button class="btn btn-pi" onclick="switchTab('pi')">
                    <span>π</span>
                    Login dengan Pi Network
                </button>
            </div>

            <!-- Pi Network Login Tab -->
            <div id="piTab" class="tab-content">
                <div class="pi-info">
                    <strong>ℹ️ Info:</strong> Login dengan Pi Network memungkinkan Anda menggunakan akun Pi yang sudah terverifikasi. Pastikan aplikasi Pi Network terinstall di perangkat Anda.
                </div>

                <button id="piLoginBtn" class="btn btn-pi" onclick="loginWithPi()">
                    <span style="font-size: 24px; font-weight: bold;">π</span>
                    Login dengan Pi Network
                </button>

                <div class="divider">
                    <span>atau</span>
                </div>

                <button class="btn btn-primary" onclick="switchTab('email')">
                    Login dengan Email
                </button>
            </div>

            <div class="register-link">
                Belum punya akun? <a href="register.html">Daftar sekarang</a>
            </div>

            <div class="back-home">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // HIDAYATULAMIN - LOGIN MODULE
        // Dengan integrasi Pi Network & Firebase
        // ==========================================

        // Konfigurasi Firebase - GANTI DENGAN KONFIGURASI ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Inisialisasi Pi SDK
        let Pi = window.Pi;
        let piInitialized = false;

        // ==========================================
        // FUNGSI UTILITY
        // ==========================================

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            setTimeout(() => successDiv.classList.remove('show'), 3000);
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }

        function switchTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            
            // Clear messages
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // ==========================================
        // PI NETWORK AUTHENTICATION
        // ==========================================

        async function initPiSDK() {
            try {
                if (!Pi) {
                    console.error('Pi SDK tidak tersedia');
                    return false;
                }

                // Inisialisasi Pi SDK dengan sandbox mode untuk development
                // Ganti ke false untuk production
                Pi.init({ version: "2.0", sandbox: true });
                piInitialized = true;
                console.log('✅ Pi SDK berhasil diinisialisasi');
                return true;
            } catch (error) {
                console.error('❌ Gagal inisialisasi Pi SDK:', error);
                return false;
            }
        }

        async function loginWithPi() {
            showLoading(true);
            
            try {
                // Inisialisasi Pi SDK jika belum
                if (!piInitialized) {
                    const initialized = await initPiSDK();
                    if (!initialized) {
                        throw new Error('Gagal menginisialisasi Pi SDK');
                    }
                }

                // Autentikasi dengan Pi Network
                const scopes = ['username', 'payments', 'wallet_address'];
                const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                console.log('✅ Pi Auth Success:', authResult);
                
                // Proses login dengan data Pi
                await processPiLogin(authResult);
                
            } catch (error) {
                console.error('❌ Pi Login Error:', error);
                showError('Gagal login dengan Pi Network: ' + error.message);
                showLoading(false);
            }
        }

        // Callback untuk pembayaran tidak lengkap
        function onIncompletePaymentFound(payment) {
            console.log('⚠️ Pembayaran tidak lengkap ditemukan:', payment);
            return Promise.resolve();
        }

        async function processPiLogin(authResult) {
            try {
                const { user, accessToken } = authResult;
                
                // Cek apakah user sudah ada di Firestore
                const userRef = db.collection('users').doc(user.uid);
                const userDoc = await userRef.get();
                
                const userData = {
                    uid: user.uid,
                    username: user.username,
                    wallet_address: user.wallet_address || null,
                    loginMethod: 'pi',
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    accessToken: accessToken
                };
                
                if (!userDoc.exists) {
                    // User baru - buat profil baru
                    userData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    userData.email = user.username + '@pi.network';
                    userData.profileComplete = false;
                    
                    await userRef.set(userData);
                    console.log('✅ Profil Pi user baru dibuat');
                } else {
                    // User existing - update data
                    await userRef.update(userData);
                    console.log('✅ Profil Pi user diperbarui');
                }
                
                // Simpan ke localStorage untuk session
                localStorage.setItem('hidayatulamin_user', JSON.stringify({
                    uid: user.uid,
                    username: user.username,
                    loginMethod: 'pi',
                    isAuthenticated: true
                }));
                
                showSuccess('Login berhasil! Mengalihkan...');
                
                // Redirect ke home setelah 1.5 detik
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                console.error('❌ Process Pi Login Error:', error);
                throw error;
            } finally {
                showLoading(false);
            }
        }

        // ==========================================
        // EMAIL/PASSWORD AUTHENTICATION
        // ==========================================

        document.getElementById('emailLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            showLoading(true);
            
            try {
                // Login dengan Firebase Auth
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                console.log('✅ Email Login Success:', user.uid);
                
                // Update last login di Firestore
                await db.collection('users').doc(user.uid).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Simpan session
                localStorage.setItem('hidayatulamin_user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    loginMethod: 'email',
                    isAuthenticated: true
                }));
                
                showSuccess('Login berhasil! Mengalihkan...');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                console.error('❌ Email Login Error:', error);
                
                let errorMessage = 'Gagal login. Silakan coba lagi.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'Email tidak terdaftar. Silakan daftar terlebih dahulu.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Password salah. Silakan coba lagi.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Format email tidak valid.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'Akun ini telah dinonaktifkan.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Terlalu banyak percobaan login. Silakan coba lagi nanti.';
                        break;
                }
                
                showError(errorMessage);
                showLoading(false);
            }
        });

        // ==========================================
        // CEK AUTH STATUS SAAT LOAD
        // ==========================================

        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log('👤 User sudah login:', user.uid);
            }
        });

        // Inisialisasi Pi SDK saat halaman load
        document.addEventListener('DOMContentLoaded', () => {
            initPiSDK();
        });

        // ==========================================
        // LOGOUT FUNCTION
        // ==========================================

        function logout() {
            auth.signOut().then(() => {
                localStorage.removeItem('hidayatulamin_user');
                window.location.href = 'login.html';
            }).catch((error) => {
                console.error('Logout error:', error);
            });
        }

        // Export fungsi untuk global access
        window.logout = logout;
        window.loginWithPi = loginWithPi;
        window.switchTab = switchTab;
    </script>
</body>
</html>
