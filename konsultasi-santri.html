<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Konsultasi | Portal Santri</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
                        purple: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed', 800: '#6b21a8', 900: '#581c87' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
        .glass-dark { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); }
        .gradient-purple { background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%); }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 16px; margin-bottom: 8px; }
        .chat-sent { background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .chat-received { background: #f3f4f6; color: #1f2937; margin-right: auto; border-bottom-left-radius: 4px; }
        .dark .chat-received { background: #374151; color: #f3f4f6; }
    </style>
</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 h-screen flex flex-col">
    
    <!-- Header -->
    <header class="glass dark:glass-dark border-b border-gray-200 dark:border-gray-800 flex-shrink-0">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center gap-3">
            <button onclick="history.back()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-400">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="flex items-center gap-3 flex-1">
                <div class="w-10 h-10 rounded-full bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center">
                    <i class="fas fa-user-tie text-purple-600"></i>
                </div>
                <div>
                    <h1 class="font-bold text-sm">Ustadz Hasan</h1>
                    <p class="text-xs text-green-600 flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>Online
                    </p>
                </div>
            </div>
            <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-yellow-400">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <!-- Chat Area -->
    <div class="flex-1 overflow-y-auto p-4 max-w-lg mx-auto w-full" id="chatArea">
        <div class="text-center text-xs text-gray-500 my-4">Hari ini, 14:30</div>
        
        <div class="chat-bubble chat-received">
            <p class="text-sm">Assalamu'alaikum Ahmad, ada yang bisa saya bantu?</p>
            <span class="text-[10px] opacity-70 mt-1 block">14:30</span>
        </div>
        
        <div class="chat-bubble chat-sent">
            <p class="text-sm">Wa'alaikumsalam Ustadz, saya mau tanya tentang jadwal setoran hafalan besok</p>
            <span class="text-[10px] opacity-70 mt-1 block text-right">14:32</span>
        </div>
        
        <div class="chat-bubble chat-received">
            <p class="text-sm">Besok setoran jam 07:00 ya, siapkan Juz 6 halaman 108-110</p>
            <span class="text-[10px] opacity-70 mt-1 block">14:33</span>
        </div>
        
        <div class="chat-bubble chat-sent">
            <p class="text-sm">Baik Ustadz, terima kasih</p>
            <span class="text-[10px] opacity-70 mt-1 block text-right">14:35</span>
        </div>
    </div>

    <!-- Input Area -->
    <div class="border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-800 p-4 flex-shrink-0">
        <div class="max-w-lg mx-auto flex items-center gap-2">
            <button class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-400">
                <i class="fas fa-paperclip"></i>
            </button>
            <input type="text" id="messageInput" placeholder="Ketik pesan..." 
                   class="flex-1 px-4 py-3 rounded-full border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-white focus:border-purple-500 focus:outline-none">
            <button onclick="sendMessage()" class="w-10 h-10 rounded-full gradient-purple flex items-center justify-center text-white">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.sendMessage = () => {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            const chatArea = document.getElementById('chatArea');
            const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble chat-sent';
            bubble.innerHTML = `
                <p class="text-sm">${message}</p>
                <span class="text-[10px] opacity-70 mt-1 block text-right">${time}</span>
            `;
            
            chatArea.appendChild(bubble);
            input.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;
        };

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
