<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Hidayatul Amin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 2rem;
        }

        h1 {
            color: #0f172a;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p {
            color: #64748b;
            font-size: 0.9rem;
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-btn {
            padding: 15px 10px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .role-btn:hover, .role-btn.active {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .role-btn i {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #64748b;
        }

        .role-btn.active i, .role-btn:hover i {
            color: #10b981;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #10b981;
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16,185,129,0.3);
        }

        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e2e8f0;
        }

        .links a {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }

        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
        }

        .success-msg {
            background: #dcfce7;
            color: #166534;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #10b981;
        }

        .info-box {
            background: #f0f9ff;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #1e40af;
        }

        .info-box i {
            margin-right: 8px;
        }

        /* Field khusus untuk wali */
        .wali-fields, .ustadz-fields {
            display: none;
        }

        .wali-fields.active, .ustadz-fields.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>

        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Pendaftaran Akun</h1>
            <p>Buat akun untuk mengakses portal Hidayatul Amin</p>
        </div>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>
            <strong>Perhatian:</strong> Setelah mendaftar, akun Anda perlu diverifikasi oleh Admin sebelum dapat login.
        </div>

        <div class="error-msg" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Terjadi kesalahan</span>
        </div>

        <div class="success-msg" id="successMsg">
            <i class="fas fa-check-circle"></i>
            <span id="successText">Pendaftaran berhasil! Menunggu verifikasi admin.</span>
        </div>

        <div class="role-selector">
            <button class="role-btn active" data-role="wali" onclick="selectRole('wali')">
                <i class="fas fa-users"></i>
                <small>Wali Santri</small>
            </button>
            <button class="role-btn" data-role="ustadz" onclick="selectRole('ustadz')">
                <i class="fas fa-chalkboard-teacher"></i>
                <small>Ustadz</small>
            </button>
            <button class="role-btn" data-role="admin" onclick="selectRole('admin')">
                <i class="fas fa-user-shield"></i>
                <small>Admin</small>
            </button>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Nama Lengkap *</label>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="nama@email.com" required>
            </div>

            <div class="form-group">
                <label>Password * (min 6 karakter)</label>
                <input type="password" id="password" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
                <label>Nomor HP/WhatsApp *</label>
                <input type="tel" id="noHp" placeholder="08xxxxxxxxxx" required>
            </div>

            <!-- Fields khusus Wali -->
            <div class="wali-fields active" id="waliFields">
                <div class="form-group">
                    <label>Nama Santri (Putra/Putri) *</label>
                    <input type="text" id="namaSantri" placeholder="Nama santri yang menjadi wali">
                </div>
                <div class="form-group">
                    <label>Kelas Santri</label>
                    <select id="kelasSantri">
                        <option value="">Pilih Kelas</option>
                        <option value="7A">Kelas 7A</option>
                        <option value="7B">Kelas 7B</option>
                        <option value="8A">Kelas 8A</option>
                        <option value="8B">Kelas 8B</option>
                        <option value="9A">Kelas 9A</option>
                        <option value="9B">Kelas 9B</option>
                    </select>
                </div>
            </div>

            <!-- Fields khusus Ustadz -->
            <div class="ustadz-fields" id="ustadzFields">
                <div class="form-group">
                    <label>Mata Pelajaran yang Diampu</label>
                    <select id="mataPelajaran">
                        <option value="">Pilih Mapel</option>
                        <option value="Al-Quran">Al-Quran</option>
                        <option value="Tajwid">Tajwid</option>
                        <option value="Fiqih">Fiqih</option>
                        <option value="Hadits">Hadits</option>
                        <option value="Bahasa Arab">Bahasa Arab</option>
                        <option value="Akhlaq">Akhlaq</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-register" id="btnRegister">
                <i class="fas fa-user-plus"></i>
                Daftar Sekarang
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Mendaftarkan akun...</p>
        </div>

        <div class="links">
            <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
        </div>
    </div>

    <script>
        // ==========================================
        // FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==========================================
        // GLOBAL VARIABLES
        // ==========================================
        let selectedRole = 'wali';

        // ==========================================
        // ROLE SELECTION
        // ==========================================
        function selectRole(role) {
            selectedRole = role;
            
            // Update button styles
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.role === role) {
                    btn.classList.add('active');
                }
            });

            // Show/hide specific fields
            document.getElementById('waliFields').classList.toggle('active', role === 'wali');
            document.getElementById('ustadzFields').classList.toggle('active', role === 'ustadz');

            // Update required fields
            const namaSantri = document.getElementById('namaSantri');
            if (role === 'wali') {
                namaSantri.setAttribute('required', 'required');
            } else {
                namaSantri.removeAttribute('required');
            }
        }

        // ==========================================
        // REGISTRATION HANDLER
        // ==========================================
        async function handleRegister(e) {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const noHp = document.getElementById('noHp').value.trim();
            
            // Validation
            if (password.length < 6) {
                showError('Password minimal 6 karakter');
                return;
            }

            const btn = document.getElementById('btnRegister');
            const loading = document.getElementById('loading');
            const form = document.getElementById('registerForm');

            // Hide messages
            hideMessages();
            
            // Show loading
            btn.disabled = true;
            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                // 1. Create user in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // 2. Prepare user data based on role
                let userData = {
                    uid: user.uid,
                    nama: nama,
                    email: email,
                    noHp: noHp,
                    role: selectedRole,
                    status: 'pending', // pending, active, suspended
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                // Add role-specific data
                if (selectedRole === 'wali') {
                    userData.namaSantri = document.getElementById('namaSantri').value.trim();
                    userData.kelasSantri = document.getElementById('kelasSantri').value;
                    userData.linkedSantriId = null; // Will be linked by admin later
                    
                    // Save to wali_santri collection
                    await db.collection('wali_santri').doc(user.uid).set(userData);
                    
                } else if (selectedRole === 'ustadz') {
                    userData.mataPelajaran = document.getElementById('mataPelajaran').value;
                    userData.santriBimbingan = []; // Array of santri IDs
                    
                    // Save to ustadz collection
                    await db.collection('ustadz').doc(user.uid).set(userData);
                    
                } else if (selectedRole === 'admin') {
                    // For admin, create request first (super admin must approve)
                    await db.collection('admin_requests').doc(user.uid).set({
                        ...userData,
                        requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // Also save to admins but with pending status
                    await db.collection('admins').doc(user.uid).set({
                        ...userData,
                        level: 'pending' // super, admin, pending
                    });
                }

                // 3. Send verification email
                await user.sendEmailVerification();

                // 4. Logout immediately (user must wait for approval)
                await auth.signOut();

                // Show success
                showSuccess('Pendaftaran berhasil! Silakan cek email untuk verifikasi. Akun Anda akan segera diverifikasi oleh admin.');
                
                // Reset form
                form.reset();
                
                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);

            } catch (error) {
                console.error('Registration error:', error);
                
                let errorMessage = 'Terjadi kesalahan saat mendaftar';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Email sudah terdaftar. Silakan login atau gunakan email lain.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Format email tidak valid';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password terlalu lemah. Minimal 6 karakter.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Koneksi internet bermasalah. Silakan coba lagi.';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                showError(errorMessage);
                
                // Reset UI
                btn.disabled = false;
                form.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            document.getElementById('errorText').textContent = message;
            errorMsg.style.display = 'flex';
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            document.getElementById('successText').textContent = message;
            successMsg.style.display = 'flex';
        }

        function hideMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        // Check if user is already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                // If already logged in, redirect to appropriate dashboard
                console.log('User already logged in:', user.email);
            }
        });
    </script>

</body>
</html>
