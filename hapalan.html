<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

                }
            }

    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }

</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">

                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 font-medium">
                    <i class="fas fa-book-open w-5"></i>Input Hafalan
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Mobile Header -->
            <header class="md:hidden glass-dark border-b border-gray-800 p-4 flex items-center justify-between">
                <a href="dashboard-ustadz.html" class="w-10 h-10 rounded-xl bg-gray-800 flex items-center justify-center text-gray-400">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="font-bold">Input Hafalan</h1>
                <div class="w-10"></div>
            </header>

            <div class="max-w-4xl mx-auto p-6">
                <!-- Header -->
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Input Setoran Hafalan</h2>
                    <p class="text-gray-500">Catat perkembangan hafalan santri</p>
                </div>

                <!-- Search Santri -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-200 dark:border-gray-700 mb-6">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Cari Santri</label>
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="searchSantri" placeholder="Ketik nama atau NIS..." 
                               class="w-full pl-12 pr-4 py-4 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-emerald-500 focus:outline-none transition"
                               oninput="filterSantri(this.value)">
                    </div>
                    
                    <!-- Santri List -->
                    <div id="santriList" class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-48 overflow-y-auto">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Selected Santri Info -->
                <div id="selectedSantriInfo" class="hidden bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl p-6 border border-emerald-200 dark:border-emerald-800 mb-6">
                    <div class="flex items-center gap-4">
                        <img id="selectedAvatar" src="" class="w-16 h-16 rounded-full">
                        <div class="flex-1">
                            <h3 id="selectedName" class="text-lg font-bold text-gray-900 dark:text-white"></h3>
                            <p id="selectedNIS" class="text-sm text-gray-500"></p>
                            <div class="flex items-center gap-4 mt-2">
                                <span class="text-sm">
                                    <span class="text-gray-500">Target:</span>
                                    <span id="selectedTarget" class="font-semibold text-emerald-600"></span>
                                </span>
                                <span class="text-sm">
                                    <span class="text-gray-500">Terakhir:</span>
                                    <span id="selectedLast" class="font-semibold text-emerald-600"></span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Input Form -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-200 dark:border-gray-700 mb-6">
                    <h3 class="font-bold text-gray-900 dark:text-white mb-4">Detail Setoran</h3>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <!-- Surah Selection -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Surah</label>
                            <select id="surahSelect" onchange="updateAyatRange()" 
                                    class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-emerald-500 focus:outline-none">
                                <option value="">Pilih Surah</option>
                            </select>
                        </div>

                        <!-- Tanggal -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Tanggal</label>
                            <input type="date" id="tanggalInput" 
                                   class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-emerald-500 focus:outline-none">
                        </div>

                        <!-- Ayat Awal -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Ayat Awal</label>
                            <input type="number" id="ayatAwal" min="1" placeholder="1" 
                                   class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-emerald-500 focus:outline-none">
                        </div>

                        <!-- Ayat Akhir -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Ayat Akhir</label>
                            <input type="number" id="ayatAkhir" min="1" placeholder="7" 
                                   class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-emerald-500 focus:outline-none">
                        </div>

                        <!-- Juz -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Juz</label>
                            <input type="number" id="juzInput" min="1" max="30" placeholder="1" 
                                   class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-emerald-500 focus:outline-none">
                        </div>

                        <!-- Status -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Status</label>
                            <select id="statusSelect" 
                                    class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-emerald-500 focus:outline-none">
                                <option value="lancar">Lancar</option>
                                <option value="cukup">Cukup</option>
                                <option value="kurang">Perlu Perbaikan</option>
                            </select>
                        </div>
                    </div>

                    <!-- Catatan -->
                    <div class="mt-6">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Catatan (Opsional)</label>
                        <textarea id="catatanInput" rows="3" placeholder="Tambahkan catatan..." 
                                  class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-emerald-500 focus:outline-none resize-none"></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button onclick="submitHafalan()" id="submitBtn" 
                            class="w-full mt-6 py-4 rounded-xl bg-emerald-600 text-white font-bold text-lg hover:bg-emerald-700 transition flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-save"></i>
                        <span>Simpan Setoran</span>
                    </button>
                </div>

                <!-- Recent Entries -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-gray-900 dark:text-white">Setoran Terbaru Hari Ini</h3>
                        <span class="text-sm text-gray-500" id="todayCount">0 entri</span>
                    </div>
                    <div id="recentList" class="space-y-3">
                        <p class="text-center text-gray-500 py-8">Belum ada setoran hari ini</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 transform translate-x-full transition-transform duration-300 z-50">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-4 flex items-center gap-3 border-l-4 border-emerald-500 min-w-[300px]">
            <div class="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 flex items-center justify-center">
                <i class="fas fa-check"></i>
            </div>
            <div>
                <p class="font-semibold text-gray-900 dark:text-white text-sm" id="toastTitle">Berhasil!</p>
                <p class="text-xs text-gray-500" id="toastMessage">Data telah disimpan</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVKeCAJ6_IitpZfu-tF2QaT0esFbbNCAM",
            authDomain: "hidayatulamin-e6f22.firebaseapp.com",
            projectId: "hidayatulamin-e6f22",
            storageBucket: "hidayatulamin-e6f22.firebasestorage.app",
            messagingSenderId: "80743607267",
            appId: "1:80743607267:web:f5f94165de021759958ed6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let selectedSantri = null;
        let todayEntries = [];

        // Daftar Surah
        const surahList = [
            { no: 1, nama: "Al-Fatihah", ayat: 7 },
            { no: 2, nama: "Al-Baqarah", ayat: 286 },
            { no: 3, nama: "Ali Imran", ayat: 200 },
            { no: 4, nama: "An-Nisa", ayat: 176 },
            { no: 5, nama: "Al-Maidah", ayat: 120 },
            { no: 67, nama: "Al-Mulk", ayat: 30 },
            { no: 68, nama: "Al-Qalam", ayat: 52 },
            { no: 69, nama: "Al-Haqqah", ayat: 52 },
            { no: 70, nama: "Al-Ma'arij", ayat: 44 },
            { no: 71, nama: "Nuh", ayat: 28 },
            { no: 72, nama: "Al-Jinn", ayat: 28 },
            { no: 73, nama: "Al-Muzzammil", ayat: 20 },
            { no: 74, nama: "Al-Muddaththir", ayat: 56 },
            { no: 75, nama: "Al-Qiyamah", ayat: 40 },
            { no: 76, nama: "Al-Insan", ayat: 31 },
            { no: 77, nama: "Al-Mursalat", ayat: 50 },
            { no: 78, nama: "An-Naba", ayat: 40 },
            { no: 79, nama: "An-Nazi'at", ayat: 46 },
            { no: 80, nama: "'Abasa", ayat: 42 },
            { no: 81, nama: "At-Takwir", ayat: 29 },
            { no: 82, nama: "Al-Infitar", ayat: 19 },
            { no: 83, nama: "Al-Mutaffifin", ayat: 36 },
            { no: 84, nama: "Al-Inshiqaq", ayat: 25 },
            { no: 85, nama: "Al-Buruj", ayat: 22 },
            { no: 86, nama: "At-Tariq", ayat: 17 },
            { no: 87, nama: "Al-A'la", ayat: 19 },
            { no: 88, nama: "Al-Ghashiyah", ayat: 26 },
            { no: 89, nama: "Al-Fajr", ayat: 30 },
            { no: 90, nama: "Al-Balad", ayat: 20 },
            { no: 91, nama: "Ash-Shams", ayat: 15 },
            { no: 92, nama: "Al-Layl", ayat: 21 },
            { no: 93, nama: "Ad-Duha", ayat: 11 },
            { no: 94, nama: "Ash-Sharh", ayat: 8 },
            { no: 95, nama: "At-Tin", ayat: 8 },
            { no: 96, nama: "Al-'Alaq", ayat: 19 },
            { no: 97, nama: "Al-Qadr", ayat: 5 },
            { no: 98, nama: "Al-Bayyinah", ayat: 8 },
            { no: 99, nama: "Az-Zalzalah", ayat: 8 },
            { no: 100, nama: "Al-'Adiyat", ayat: 11 },
            { no: 101, nama: "Al-Qari'ah", ayat: 11 },
            { no: 102, nama: "At-Takathur", ayat: 8 },
            { no: 103, nama: "Al-'Asr", ayat: 3 },
            { no: 104, nama: "Al-Humazah", ayat: 9 },
            { no: 105, nama: "Al-Fil", ayat: 5 },
            { no: 106, nama: "Quraisy", ayat: 4 },
            { no: 107, nama: "Al-Ma'un", ayat: 7 },
            { no: 108, nama: "Al-Kawthar", ayat: 3 },
            { no: 109, nama: "Al-Kafirun", ayat: 6 },
            { no: 110, nama: "An-Nasr", ayat: 3 },
            { no: 111, nama: "Al-Masad", ayat: 5 },
            { no: 112, nama: "Al-Ikhlas", ayat: 4 },
            { no: 113, nama: "Al-Falaq", ayat: 5 },
            { no: 114, nama: "An-Nas", ayat: 6 }
        ];

        // Populate Surah Select
        const surahSelect = document.getElementById('surahSelect');
        surahList.forEach(surah => {
            const option = document.createElement('option');
            option.value = surah.no;
            option.textContent = `${surah.no}. ${surah.nama} (${surah.ayat} ayat)`;
            option.dataset.ayat = surah.ayat;
            surahSelect.appendChild(option);
        });

        // Set today's date
        document.getElementById('tanggalInput').valueAsDate = new Date();

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            loadSantri();
            loadTodayEntries();
        });

        function loadSantri() {
            // Mock data - replace with Firestore query
            const santriData = [
                { nis: '2024001', nama: 'Ahmad Fauzi', kelas: '6A', target: 'Juz 5', last: 'Juz 4: 120-140', avatar: 'Ahmad' },
                { nis: '2024002', nama: 'Muhammad Rizky', kelas: '6A', target: 'Juz 4', last: 'Juz 3: 50-70', avatar: 'Muhammad' },
                { nis: '2024003', nama: 'Abdul Rahman', kelas: '6B', target: 'Juz 6', last: 'Juz 5: 200-220', avatar: 'Abdul' },
                { nis: '2024004', nama: 'Fatih Abdullah', kelas: '6B', target: 'Juz 3', last: 'Juz 2: 180-200', avatar: 'Fatih' },
                { nis: '2024005', nama: 'Ibrahim Khalil', kelas: '6A', target: 'Juz 7', last: 'Juz 6: 50-70', avatar: 'Ibrahim' }
            ];
            
            renderSantriList(santriData);
        }

        function renderSantriList(santriData) {
            const container = document.getElementById('santriList');
            container.innerHTML = santriData.map(s => `
                <div onclick="selectSantri('${s.nis}')" class="surah-card cursor-pointer p-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center gap-3" data-nis="${s.nis}">
                    <img src="https://ui-avatars.com/api/?name=${s.avatar}&background=10b981&color=fff" class="w-10 h-10 rounded-full">
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-gray-900 dark:text-white text-sm truncate">${s.nama}</p>
                        <p class="text-xs text-gray-500">${s.kelas} • NIS: ${s.nis}</p>
                    </div>
                </div>
            `).join('');
            
            // Store for filtering
            window.santriData = santriData;
        }

        window.filterSantri = (query) => {
            const filtered = window.santriData.filter(s => 
                s.nama.toLowerCase().includes(query.toLowerCase()) ||
                s.nis.includes(query)
            );
            renderSantriList(filtered);
        };

        window.selectSantri = (nis) => {
            selectedSantri = window.santriData.find(s => s.nis === nis);
            if (!selectedSantri) return;
            
            // Update UI
            document.querySelectorAll('.surah-card').forEach(card => {
                card.classList.remove('selected', 'ring-2', 'ring-emerald-500');
            });
            document.querySelector(`[data-nis="${nis}"]`).classList.add('selected', 'ring-2', 'ring-emerald-500');
            
            // Show info
            document.getElementById('selectedSantriInfo').classList.remove('hidden');
            document.getElementById('selectedAvatar').src = `https://ui-avatars.com/api/?name=${selectedSantri.avatar}&background=10b981&color=fff`;
            document.getElementById('selectedName').textContent = selectedSantri.nama;
            document.getElementById('selectedNIS').textContent = `${selectedSantri.kelas} • NIS: ${selectedSantri.nis}`;
            document.getElementById('selectedTarget').textContent = selectedSantri.target;
            document.getElementById('selectedLast').textContent = selectedSantri.last;
        };

        window.updateAyatRange = () => {
            const select = document.getElementById('surahSelect');
            const selectedOption = select.options[select.selectedIndex];
            const maxAyat = parseInt(selectedOption.dataset.ayat) || 286;
            
            document.getElementById('ayatAwal').max = maxAyat;
            document.getElementById('ayatAkhir').max = maxAyat;
        };

        window.submitHafalan = async () => {
            if (!selectedSantri) {
                showToast('Error', 'Pilih santri terlebih dahulu');
                return;
            }
            
            const surahSelect = document.getElementById('surahSelect');
            const surahNo = surahSelect.value;
            const surahNama = surahSelect.options[surahSelect.selectedIndex].text.split('. ')[1]?.split(' (')[0] || '';
            
            if (!surahNo) {
                showToast('Error', 'Pilih surah');
                return;
            }
            
            const data = {
                santriId: selectedSantri.nis,
                santriNama: selectedSantri.nama,
                surah: surahNama,
                surahNo: parseInt(surahNo),
                ayatAwal: parseInt(document.getElementById('ayatAwal').value) || 1,
                ayatAkhir: parseInt(document.getElementById('ayatAkhir').value) || 1,
                juz: parseInt(document.getElementById('juzInput').value) || 1,
                status: document.getElementById('statusSelect').value,
                catatan: document.getElementById('catatanInput').value,
                tanggal: document.getElementById('tanggalInput').value,
                ustadzId: currentUser.uid,
                createdAt: serverTimestamp()
            };
            
            try {
                await addDoc(collection(db, "hafalan"), data);
                
                // Success
                showToast('Berhasil!', `Setoran ${selectedSantri.nama} telah disimpan`);
                confetti({
                    particleCount: 50,
                    spread: 60,
                    origin: { y: 0.7 },
                    colors: ['#10b981', '#059669', '#34d399']
                });
                
                // Reset form
                document.getElementById('surahSelect').value = '';
                document.getElementById('ayatAwal').value = '';
                document.getElementById('ayatAkhir').value = '';
                document.getElementById('catatanInput').value = '';
                
                // Refresh list
                addToRecentList(data);
                
            } catch (error) {
                console.error("Error:", error);
                showToast('Error', 'Gagal menyimpan data');
            }
        };

        function loadTodayEntries() {
            const today = new Date().toISOString().split('T')[0];
            const q = query(
                collection(db, "hafalan"),
                where("tanggal", "==", today),
                orderBy("createdAt", "desc")
            );
            
            onSnapshot(q, (snapshot) => {
                todayEntries = [];
                snapshot.forEach(doc => todayEntries.push(doc.data()));
                updateRecentList();
            });
        }

        function addToRecentList(data) {
            todayEntries.unshift(data);
            updateRecentList();
        }

        function updateRecentList() {
            const container = document.getElementById('recentList');
            document.getElementById('todayCount').textContent = `${todayEntries.length} entri`;
            
            if (todayEntries.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">Belum ada setoran hari ini</p>';
                return;
            }
            
            container.innerHTML = todayEntries.slice(0, 5).map(entry => `
                <div class="flex items-center gap-4 p-4 rounded-xl bg-gray-50 dark:bg-gray-700/50">
                    <div class="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 flex items-center justify-center">
                        <i class="fas fa-check"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold text-gray-900 dark:text-white text-sm">${entry.santriNama}</p>
                        <p class="text-xs text-gray-500">${entry.surah}: ${entry.ayatAwal}-${entry.ayatAkhir}</p>
                    </div>
                    <span class="px-2 py-1 rounded-full text-xs font-medium ${
                        entry.status === 'lancar' ? 'bg-green-100 text-green-700' :
                        entry.status === 'cukup' ? 'bg-yellow-100 text-yellow-700' :
                        'bg-red-100 text-red-700'
                    }">${entry.status}</span>
                </div>
            `).join('');
        }

        function showToast(title, message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('translate-x-full');
            setTimeout(() => toast.classList.add('translate-x-full'), 3000);
        }

        // Dark mode check
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
